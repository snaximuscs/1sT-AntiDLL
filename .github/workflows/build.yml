name: Build AMBuild Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - created

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    env:
      CC: clang
      CXX: clang++
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Generate build number
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        id: buildnumber
        uses: onyxmueller/build-tag-number@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install container dependencies
        run: |
          apt-get update -qy
          apt-get install -y git clang binutils zip python3 python3-pip python3-setuptools software-properties-common

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install git+https://github.com/alliedmodders/ambuild.git

          mkdir -p external
          cd external
          git clone --recursive --branch master --single-branch https://github.com/alliedmodders/metamod-source.git
          git clone --recursive --branch cs2 --single-branch https://github.com/alliedmodders/hl2sdk.git hl2sdk-cs2

          cd "$GITHUB_WORKSPACE"
          git clone https://github.com/pisex/SchemaEntity.git ../SchemaEntity
          git clone https://github.com/DEVELOPER-FPB/Ray-Trace.git ../Ray-Trace || git clone https://github.com/FUNPLAY-pro-CS2/Ray-Trace.git ../Ray-Trace
          git clone https://github.com/zer0k-z/sql_mm.git ../sql_mm

          sed -i 's/NetworkStateChanged_t/NetworkStateChangedData/g' ../SchemaEntity/schemasystem.cpp

      - name: Configure and build plugin
        run: |
          mkdir -p build
          cd build
          python3 ../configure.py -s cs2 --targets x86_64 --enable-optimize \
            --hl2sdk-manifests="$GITHUB_WORKSPACE/external/metamod-source/hl2sdk-manifests" \
            --mms_path="$GITHUB_WORKSPACE/external/metamod-source" \
            --hl2sdk-root="$GITHUB_WORKSPACE/external"
          ambuild

      - name: Create archive
        run: |
          if [ -d "build/package" ]; then
            cd build/package
            zip -r ../../plugin.zip addons
          else
            cd build
            zip -r ../plugin.zip .
          fi

      - name: Upload archive to artifact
        uses: actions/upload-artifact@v4
        with:
          name: compile
          path: plugin.zip

  release:
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write
    runs-on: ubuntu-latest
  
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: compile
          path: .
  
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: plugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}