"Config"
{
    // ============================================================
    // 1sT-AntiDLL v1.1.0 configuration
    // Available variables in messages/commands: {userid}, {steamid}, {name}
    // ============================================================

    // --- Core ---
    "enabled"                   "1"
    "debug_mode"                "0"
    "ignore_bots"               "1"
    "ignore_admins"             "1"

    // --- Violation Points ---
    "violation_threshold"       "300"
    "points_per_detection"      "50"
    "point_decay"               "10"
    "decay_interval"            "30"

    // --- Punishment ---
    "punish_type"               "1"     // 0 = kick, 1 = command (punish_command)
    "punish_command"            "css_ban {steamid} 0 AntiDLL"
    "chat_message"              " \x02[1sT-AntiDLL]\x01 {name} was detected and punished"

    // --- RayTrace Visibility ---
    "raytrace_required"         "0"     // 0 = angle-only mode, 1 = require Ray-Trace
    "raytrace_debug_beam"       "0"

    // --- DLL Detection (event-listener probe) ---
    "interval"                  "5"

    // --- Hidden-Target Tracking ---
    "wh_detection_enabled"      "1"
    "wh_debug_only"             "1"     // Keep enabled until tuned for your server
    "wh_check_interval"         "0.5"
    "wh_tracking_threshold"     "4.0"
    "wh_reset_gap"              "0.75"
    "wh_cooldown"               "20.0"
    "wh_max_distance"           "2500.0"
    "wh_min_samples"            "8"
    "wh_violation_points"       "25"
    "wh_dot_threshold"          "0.995"

    // --- Aim Pattern Detection ---
    "aim_detection_enabled"     "1"
    "aim_debug_only"            "1"     // Evidence only until tuned
    "aim_check_interval"        "0.25"
    "aim_min_samples"           "5"
    "aim_snap_angle_threshold"  "30.0"  // Degrees: minimum angle change to consider a snap
    "aim_snap_dot_threshold"    "0.96"  // Dot product: how closely snap must aim at enemy
    "aim_cooldown"              "30.0"
    "aim_points"                "15"

    // --- Trigger Pattern Detection ---
    "trigger_detection_enabled" "1"
    "trigger_debug_only"        "1"     // Evidence only until tuned (requires RayTrace)
    "trigger_min_samples"       "5"
    "trigger_max_reaction_sec"  "0.5"   // Max seconds after visibility for suspicious shot
    "trigger_cooldown"          "30.0"
    "trigger_points"            "15"

    // --- Composite Risk ---
    "composite_enabled"         "1"
    "composite_min_categories"  "3"     // Evidence needed in N categories to trigger
    "composite_bonus_points"    "50"    // Extra points when composite triggers

    // --- Logging ---
    "logs"                      "1"
    "log_file"                  "addons/AntiDLL/logs/antidll.log"

    // --- Discord Webhook ---
    "webhook_enabled"           "1"
    "webhook_url"               ""      // Paste your Discord webhook URL here
    "webhook_min_points"        "25"
    "webhook_plugin_load"       "1"     // Send webhook on plugin load
    "webhook_violations"        "1"     // Send webhook on violations
    "webhook_punishments"       "1"     // Send webhook on punishments

    // --- MySQL ---
    // Same config on all servers. Each server auto-detects its own IP:port
    // and looks up its name from the antidll_servers table.
    "mysql_enabled"             "0"     // Set to 1 to enable MySQL integration
    "mysql_host"                "127.0.0.1"
    "mysql_port"                "3306"
    "mysql_user"                "antidll"
    "mysql_password"            "CHANGE_ME"
    "mysql_database"            "antidll"
    "mysql_detection_table"     "antidll_detections"

    // --- Server Identity ---
    // Server name is resolved from MySQL (antidll_servers table) by auto-detected IP:port.
    // No need to configure IP/port/name per server — the DB is the single source of truth.
    "server_identity_enabled"           "1"
    "server_identity_table"             "antidll_servers"
    "server_identity_refresh_interval"  "300"   // Seconds between MySQL identity refreshes
    "server_identity_fail_name"         "Unknown Server"  // Used when MySQL is unavailable or no match
}
