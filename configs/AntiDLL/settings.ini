"Config"
{
    // ============================================================
    // 1sT-AntiDLL configuration
    // Available variables in messages/commands: {userid}, {steamid}, {name}
    // ============================================================

    // --- Core ---
    "enabled"                   "1"     // Master switch for all detection
    "debug_mode"                "0"     // Verbose debug output in chat/console
    "ignore_bots"               "1"     // Skip fake clients (always recommended)
    "ignore_admins"             "1"     // Reserved (no admin API yet — currently a no-op)

    // --- Violation Points ---
    "violation_threshold"       "300"   // Points needed before punishment (clamp: >= 100)
    "points_per_detection"      "50"    // Points per DLL event-listener detection
    "point_decay"               "10"    // Points removed each decay cycle
    "decay_interval"            "30"    // Decay cycle interval (seconds)

    // --- RayTrace Visibility ---
    "raytrace_required"         "0"     // 0 = angle-only mode (no Ray-Trace needed), 1 = require Ray-Trace
    "raytrace_debug_beam"       "0"     // Draw server-side debug beams for traces

    // --- Suspicious Hidden Target Tracking ---
    "wh_detection_enabled"      "1"     // Enable hidden-target tracking detector
    "wh_debug_only"             "0"     // 0 = enforce (punish), 1 = log only (keep on while tuning)
    "wh_check_interval"         "0.5"   // Detector interval (seconds, clamp: >= 0.25)
    "wh_tracking_threshold"     "4.0"   // Continuous tracking time before evidence (clamp: >= 2.0)
    "wh_reset_gap"              "0.75"  // Max gap between samples before tracking resets
    "wh_cooldown"               "20.0"  // Cooldown between evidence events per player (clamp: >= 5)
    "wh_max_distance"           "2500.0"// Ignore enemies farther than this (units)
    "wh_min_samples"            "8"     // Min positive samples before evidence
    "wh_violation_points"       "25"    // Points per evidence event (clamp: <= 50)
    "wh_dot_threshold"          "0.995" // Crosshair precision (clamp: >= 0.98)

    // --- Legacy DLL detection (event-listener probe) ---
    "punish_type"               "1"     // 0 - kick, 1 - command(punish_command)
    "punish_command"            "mm_ban {userid} 0 AntiDLL"
    "chat_message"              " \x02[1sT-AntiDLL]\x01 {name} was detected and punished"
    "interval"                  "5"     // DLL probe interval (seconds)

    // --- Logging ---
    "logs"                      "1"
    "log_file"                  "addons/AntiDLL/logs/antidll.log"

    // --- Discord ---
    "webhook_enabled"           "1"
    "webhook_url"               ""      // Paste your Discord webhook URL here
    "webhook_min_points"        "25"
}
